name: Bug report
description: Report a problem in OpenClaw WarRoom
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include exact repro steps so we can fix quickly.

  - type: input
    id: summary
    attributes:
      label: What happened?
      placeholder: Short one-line summary
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and commands.
      placeholder: |
        1. Run `openclaw-warroom`
        2. Open room ...
        3. Press ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste stack traces, terminal output, or screenshots.
      render: shell

  - type: input
    id: version
    attributes:
      label: WarRoom version
      placeholder: e.g. 0.1.0

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15 / Ubuntu 24.04

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - blocker
        - high
        - medium
        - low
